apiVersion: v1
kind: Service
metadata:
  name: {{ include "opspilot.backendFullname" . }}
  namespace: {{ include "opspilot.namespace" . }}
  labels:
    {{- include "opspilot.metadataLabels" (dict "component" "backend" "Release" .Release "Chart" .Chart "Values" .Values) | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: {{ include "opspilot.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: backend
  ports:
    - name: http
      port: {{ .Values.backend.servicePort }}
      targetPort: http
      protocol: TCP
