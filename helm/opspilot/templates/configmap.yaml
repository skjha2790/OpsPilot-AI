apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "opspilot.configMapName" . }}
  namespace: {{ include "opspilot.namespace" . }}
  labels:
    {{- include "opspilot.labels" . | nindent 4 }}
data:
  APP_NAME: {{ .Values.backend.appName | quote }}
  APP_VERSION: {{ .Values.backend.appVersion | quote }}
  ENVIRONMENT: {{ .Values.backend.environment | quote }}
  DEBUG: {{ .Values.backend.debug | toString | quote }}
  LOG_LEVEL: {{ .Values.backend.logLevel | quote }}
  OPENAI_MODEL: {{ .Values.openai.model | quote }}
  CORS_ORIGINS: {{ toJson .Values.backend.corsOrigins | quote }}
