name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    name: Backend checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependency manager
        run: python -m pip install --upgrade pip uv

      - name: Install backend dependencies
        working-directory: backend
        run: uv sync --frozen --no-dev

      - name: Run backend compile check
        working-directory: backend
        run: python -m compileall app

      # - name: Run backend tests if present
      #   working-directory: backend
      #   run: |
      #     set -e
      #     if find . -type f \( -name 'test_*.py' -o -name '*_test.py' \) | grep -q .; then
      #       python -m pip install pytest
      #       pytest
      #     else
      #       echo "No backend tests found. Skipping pytest."
      #     fi

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build React frontend
        working-directory: frontend
        run: npm run build

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          if-no-files-found: error

  container:
    name: Docker validation
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # - name: Validate backend Dockerfile
      #   run: docker build -f backend/Dockerfile backend --tag opspilot-backend:ci

      - name: Validate frontend Dockerfile
        run: docker build -f frontend/Dockerfile frontend --tag opspilot-frontend:ci

  platform:
    name: Helm and Terraform checks
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.4

      - name: Run helm lint
        run: helm lint helm/opspilot

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Terraform fmt check
        working-directory: terraform
        run: terraform fmt -check -recursive

      - name: Terraform init
        working-directory: terraform
        run: terraform init -backend=false

      - name: Terraform validate
        working-directory: terraform
        run: terraform validate
